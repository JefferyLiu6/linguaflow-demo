name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: file:./prisma/test.db
          JWT_SECRET: ci-secret-not-used-in-production

  python:
    name: Python syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install agent dependencies
        run: pip install -r agent/requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile agent/main.py
          python -m py_compile agent/config.py
          python -m py_compile agent/generation.py
          python -m py_compile agent/tutor/schemas.py
          python -m py_compile agent/tutor/nodes.py
          python -m py_compile agent/tutor/graph.py
