name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: Lint · Type-check · Test · Build · E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: file:./prisma/test.db
          JWT_SECRET: ci-secret-not-used-in-production

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end test (guest mode)
        run: pnpm test:e2e
        # E2E_AUTH_EMAIL / E2E_AUTH_PASSWORD are NOT set in CI by default.
        # The authenticated-flow spec skips itself when those vars are absent.

  python:
    name: Python agent tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install agent dependencies
        run: pip install -r agent/requirements.txt

      - name: Run agent test suite
        working-directory: agent
        run: python -m pytest tests/ -q --tb=short
        # Tests mock all external services (LLM, DB, Langfuse) and run offline.
        # No OPENAI_API_KEY, DATABASE_URL, or LANGFUSE_* keys are needed.
